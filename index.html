<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>IntentPay</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   RESET + CUSTOM PROPERTIES
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #06060f;
  --s1:       rgba(255,255,255,.038);
  --s2:       rgba(255,255,255,.06);
  --s3:       rgba(255,255,255,.09);
  --b1:       rgba(255,255,255,.07);
  --b2:       rgba(255,255,255,.12);
  --b3:       rgba(255,255,255,.19);
  --t0:       #eeecff;
  --t1:       rgba(238,236,255,.6);
  --t2:       rgba(238,236,255,.35);
  --t3:       rgba(238,236,255,.17);
  --blue:     #5162f8;
  --blue2:    #7a8bfb;
  --blueg:    rgba(81,98,248,.38);
  --blues:    rgba(81,98,248,.10);
  --teal:     #0fada7;
  --teal2:    #2dd4bf;
  --tealg:    rgba(15,173,167,.35);
  --teals:    rgba(15,173,167,.09);
  --amber:    #f59e0b;
  --amber2:   #fcd34d;
  --amberg:   rgba(245,158,11,.35);
  --ambers:   rgba(245,158,11,.09);
  --rose:     #f43f5e;
  --roses:    rgba(244,63,94,.09);
  --sans:     'Inter',system-ui,sans-serif;
  --mono:     'JetBrains Mono','Fira Code',monospace;
  --r4:4px;--r8:8px;--r10:10px;--r12:12px;--r14:14px;--r16:16px;--r20:20px;
  --topbar-h: 54px;
  --sidebar-w:212px;
  --bottom-nav-h:60px;
}
html,body{
  height:100%;background:var(--bg);color:var(--t0);
  font-family:var(--sans);font-size:14px;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  overscroll-behavior:none;
}
button,textarea,input{font-family:var(--sans)}

/* ═══════════════════════════════════════
   CANVAS BACKGROUND
═══════════════════════════════════════ */
#c{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════════════════════════════════════
   ROOT SHELL — strict height budget
═══════════════════════════════════════ */
#app{
  position:relative;z-index:1;
  /* On desktop: topbar + row(sidebar + main) */
  display:grid;
  grid-template-rows:var(--topbar-h) 1fr;
  grid-template-columns:1fr;
  height:100dvh;height:100vh;
  overflow:hidden;          /* the only overflow:hidden that matters */
}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar{
  grid-row:1;grid-column:1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:var(--topbar-h);
  background:rgba(6,6,15,.85);
  backdrop-filter:blur(36px) saturate(180%);
  -webkit-backdrop-filter:blur(36px) saturate(180%);
  border-bottom:1px solid var(--b1);
  z-index:30;
}
.tb-logo{
  display:flex;align-items:center;gap:9px;
  font-size:16px;font-weight:700;letter-spacing:-.03em;cursor:pointer;user-select:none;
}
.tb-mark{
  width:28px;height:28px;border-radius:var(--r8);flex-shrink:0;
  background:linear-gradient(140deg,var(--blue) 0%,#7b5dff 100%);
  box-shadow:0 0 16px var(--blueg);
  display:flex;align-items:center;justify-content:center;
}
.tb-mark svg{width:14px;height:14px;color:#fff}
.tb-name{color:var(--t0)}
.tb-name em{color:var(--blue2);font-style:normal}
.tb-right{display:flex;align-items:center;gap:8px}
.pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:100px;
  font-size:11px;font-family:var(--mono);
  white-space:nowrap;
}
.pill-net{background:rgba(15,173,167,.08);border:1px solid rgba(15,173,167,.2);color:rgba(45,212,191,.88)}
.pill-wallet{background:var(--s1);border:1px solid var(--b1);color:var(--t1);cursor:pointer;transition:all .2s}
.pill-wallet:hover{border-color:var(--b2);color:var(--t0)}
.net-dot{width:6px;height:6px;border-radius:50%;background:var(--teal2);box-shadow:0 0 6px var(--tealg);animation:ndot 3s ease-in-out infinite;flex-shrink:0}
@keyframes ndot{0%,100%{box-shadow:0 0 4px var(--tealg)}50%{box-shadow:0 0 12px var(--tealg),0 0 22px rgba(15,173,167,.18)}}
.tb-ham{
  display:none;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r8);
  padding:6px;color:var(--t1);transition:all .2s;
}
.tb-ham:hover{background:var(--s2);color:var(--t0)}
.tb-ham svg{width:16px;height:16px;display:block}

/* ═══════════════════════════════════════
   BODY ROW  — sidebar + main
═══════════════════════════════════════ */
.body-row{
  grid-row:2;grid-column:1;
  display:flex;
  overflow:hidden;   /* clips children to remaining height */
  min-height:0;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:rgba(6,6,15,.72);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  padding:18px 10px;
  transition:transform .26s cubic-bezier(.22,.68,0,1.2);
  z-index:25;
  overflow:hidden;
}
.sb-sec{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);padding:0 8px;margin-bottom:5px;margin-top:14px;
}
.sb-sec:first-child{margin-top:0}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:var(--r8);
  font-size:13px;font-weight:500;color:var(--t1);
  cursor:pointer;transition:all .14s;border:1px solid transparent;
  margin-bottom:2px;user-select:none;
}
.sb-item:hover{background:rgba(255,255,255,.035);color:var(--t0)}
.sb-item.on{background:var(--blues);border-color:rgba(81,98,248,.2);color:var(--blue2)}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-cnt{
  margin-left:auto;background:var(--ambers);color:var(--amber2);
  border:1px solid rgba(245,158,11,.22);
  font-size:10px;font-weight:600;font-family:var(--mono);
  padding:1px 6px;border-radius:4px;
}
.sb-foot-space{flex:1}
.sb-foot{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r8);font-size:11px;font-family:var(--mono);color:var(--t3);
}

/* Sidebar overlay on mobile */
.sb-veil{
  display:none;position:fixed;inset:0;z-index:24;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  animation:fi .2s ease;
}

/* ═══════════════════════════════════════
   MAIN  — fills remaining space
═══════════════════════════════════════ */
main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-width:0;
  /* do NOT set any height or max-height here */
}

/* ═══════════════════════════════════════
   LANDING
═══════════════════════════════════════ */
.landing{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:32px 20px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.l-chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 14px;border-radius:100px;margin-bottom:24px;
  background:var(--blues);border:1px solid rgba(81,98,248,.22);
  font-size:11px;font-family:var(--mono);color:var(--blue2);
  animation:up .6s ease both;
}
.l-chip-dot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.l-h{
  font-size:clamp(42px,8vw,80px);font-weight:700;
  letter-spacing:-.05em;line-height:.9;margin-bottom:18px;
  animation:up .6s .08s ease both;
}
.l-h .g{
  background:linear-gradient(130deg,var(--blue2) 0%,var(--teal2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.l-p{font-size:16px;color:var(--t1);line-height:1.7;max-width:440px;margin:0 auto 28px;animation:up .6s .16s ease both}
.l-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;animation:up .6s .22s ease both}
.btn-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 26px;border-radius:var(--r12);
  background:var(--blue);color:#fff;border:none;
  font-size:14px;font-weight:600;letter-spacing:-.01em;
  transition:all .2s;box-shadow:0 0 28px var(--blueg),0 4px 14px rgba(0,0,0,.3);
}
.btn-cta:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 0 44px var(--blueg)}
.btn-cta svg{width:15px;height:15px}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 22px;border-radius:var(--r12);
  background:var(--s1);color:var(--t1);border:1px solid var(--b1);
  font-size:14px;transition:all .2s;
}
.btn-ghost:hover{background:var(--s2);color:var(--t0);border-color:var(--b2)}
.l-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));
  gap:10px;max-width:780px;width:100%;margin-top:48px;
  animation:up .6s .36s ease both;
}
.l-tile{
  background:rgba(255,255,255,.02);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--b1);border-radius:var(--r16);
  padding:18px;text-align:left;transition:all .22s;
}
.l-tile:hover{background:rgba(255,255,255,.038);border-color:var(--b2);transform:translateY(-2px)}
.l-tile-ic{
  width:30px;height:30px;border-radius:var(--r8);margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;
}
.l-tile-ic svg{width:14px;height:14px}
.ic-b{background:var(--blues);border:1px solid rgba(81,98,248,.18);color:var(--blue2)}
.ic-t{background:var(--teals);border:1px solid rgba(15,173,167,.18);color:var(--teal2)}
.ic-a{background:var(--ambers);border:1px solid rgba(245,158,11,.18);color:var(--amber2)}
.ic-r{background:var(--roses);border:1px solid rgba(244,63,94,.18);color:var(--rose)}
.l-tile-t{font-size:13px;font-weight:600;color:var(--t0);margin-bottom:4px}
.l-tile-s{font-size:11px;color:var(--t2);line-height:1.55;font-family:var(--mono)}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* ═══════════════════════════════════════
   DASHBOARD  — three-column on desktop
═══════════════════════════════════════ */
/* The dash is a flex column that fills main exactly */
.dash{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Fixed header — never scrolls */
.dash-hd{
  flex-shrink:0;
  padding:20px 20px 0;
}
.dash-title{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px}
.dash-sub  {font-size:11px;color:var(--t2);font-family:var(--mono);margin-bottom:16px}

/* Stats — 2col mobile, 4col desktop */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sc{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);
  padding:12px 14px;position:relative;overflow:hidden;transition:border-color .2s;
}
.sc:hover{border-color:var(--b2)}
.sc-lbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.sc-val{font-size:24px;font-weight:600;font-family:var(--mono);letter-spacing:-.04em;line-height:1}
.sc-val.a{color:var(--amber)}.sc-val.g{color:var(--teal2)}.sc-val.b{color:var(--blue2)}
.sc-d{font-size:10px;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* Insights bar */
.ins-bar{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;margin-bottom:14px;
  background:rgba(81,98,248,.05);border:1px solid rgba(81,98,248,.1);
  border-radius:var(--r10);flex-shrink:0;overflow:hidden;
}
.ins-lbl{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--blue2);
  background:var(--blues);border:1px solid rgba(81,98,248,.18);padding:3px 8px;border-radius:100px;
}
.ins-lbl svg{width:9px;height:9px}
.ins-ticker{flex:1;overflow:hidden;height:17px;position:relative}
.ins-txt{
  position:absolute;white-space:nowrap;
  font-size:11px;color:var(--t1);font-family:var(--mono);
  animation:ticker 14s linear infinite;
}
@keyframes ticker{0%{transform:translateX(100%);opacity:0}5%{opacity:1}85%{opacity:1}100%{transform:translateX(-100%);opacity:0}}

/* Flow track */
.flow{
  display:flex;align-items:center;
  padding:9px 12px;margin-bottom:14px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r10);flex-shrink:0;
}
.fn{display:flex;flex-direction:column;align-items:center;gap:4px}
.fc{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.03);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;transition:all .35s;
}
.fc svg{width:12px;height:12px;color:var(--t3);transition:color .35s}
.fc.done{background:var(--teals);border-color:rgba(15,173,167,.28)}
.fc.done svg{color:var(--teal2)}
.fc.active{background:var(--ambers);border-color:rgba(245,158,11,.28);box-shadow:0 0 10px var(--amberg)}
.fc.active svg{color:var(--amber)}
.fl{font-size:9px;color:var(--t3);transition:color .35s;white-space:nowrap}
.fl.done{color:var(--teal2)}.fl.active{color:var(--amber)}
.fcon{flex:1;height:1px;background:var(--b1);margin-bottom:13px;transition:background .35s}
.fcon.done{background:rgba(15,173,167,.3)}

/* ═══════════════════════════════════════
   DEALS CONTENT AREA
   This is the KEY fix — flex row, the scroll
   column and detail panel sit side by side
═══════════════════════════════════════ */
.deals-content{
  flex:1;         /* take remaining vertical space */
  display:flex;   /* side-by-side columns */
  overflow:hidden;/* clip to available height */
  min-height:0;
}

/* Left column: scrollable list + input */
.deals-left{
  flex:1;
  display:flex;flex-direction:column;
  overflow:hidden;min-width:0;
}

/* The scroll area — explicitly auto overflow-y */
.deals-scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:0 20px 16px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;
}
.deals-scroll::-webkit-scrollbar{width:4px}
.deals-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px}

/* ═══════════════════════════════════════
   DEAL CARD  — fully explicit rows
═══════════════════════════════════════ */
.dc{
  /* Block layout — not flex, not grid — simple block flow */
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--r16);
  padding:16px 18px;
  margin-bottom:10px;
  cursor:pointer;
  position:relative;
  height:auto;
  min-height:max-content;
  overflow:visible;
  /* NO overflow hidden on the card itself */
  transition:all .22s cubic-bezier(.2,.8,.3,1);
}
.dc:last-child{margin-bottom:0}
.dc:hover{background:var(--s2);border-color:var(--b2);transform:translateY(-1px);box-shadow:0 12px 40px rgba(0,0,0,.38)}
.dc.escrow {border-color:rgba(245,158,11,.2)}
.dc.released{border-color:rgba(15,173,167,.2)}
.dc.disputed{border-color:rgba(244,63,94,.2)}
.dc.sel{
  border-color:rgba(81,98,248,.4)!important;
  box-shadow:0 0 0 1px rgba(81,98,248,.12),0 12px 40px rgba(0,0,0,.4);
}

/* Absolute tint — sits behind content but inside border */
.dc-tint{
  position:absolute;inset:0;border-radius:var(--r16);pointer-events:none;
}
.dc.escrow  .dc-tint{background:radial-gradient(ellipse 80% 45% at 50% 0%,rgba(245,158,11,.055),transparent)}
.dc.released .dc-tint{background:radial-gradient(ellipse 80% 45% at 50% 0%,rgba(15,173,167,.04),transparent)}

/* Row 1 */
.dc-r1{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
  margin-bottom:10px;
  position:relative;/* above tint z-index */
}
.dc-amount{font-family:var(--mono);font-size:26px;font-weight:500;letter-spacing:-.04em;line-height:1;color:var(--t0)}
.dc-token{font-size:12px;color:var(--t2);margin-left:4px;font-weight:400;font-family:var(--sans)}
.dc-recip{font-size:11px;font-family:var(--mono);color:var(--t2);margin-top:5px}
.dc-pills{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}

/* Status pill */
.sp{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 9px;border-radius:100px;white-space:nowrap;
}
.sp.esc {background:var(--ambers);color:var(--amber2);border:1px solid rgba(245,158,11,.25)}
.sp.rel {background:var(--teals); color:var(--teal2); border:1px solid rgba(15,173,167,.25)}
.sp.dis {background:var(--roses); color:var(--rose);  border:1px solid rgba(244,63,94,.25)}
.sp-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sp-dot.esc{background:var(--amber);animation:blink 2s ease-in-out infinite}
.sp-dot.rel{background:var(--teal2)}
.sp-dot.dis{background:var(--rose)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* Risk pill */
.rp{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:700;font-family:var(--mono);
  letter-spacing:.04em;text-transform:uppercase;
  padding:3px 7px;border-radius:var(--r4);
}
.rp.low{background:var(--teals);color:var(--teal2);border:1px solid rgba(15,173,167,.2)}
.rp.med{background:var(--ambers);color:var(--amber2);border:1px solid rgba(245,158,11,.2)}
.rp.hi {background:var(--roses); color:var(--rose); border:1px solid rgba(244,63,94,.2)}
.rp svg{width:8px;height:8px}

/* Row 2: condition */
.dc-cond{
  display:flex;align-items:flex-start;gap:7px;
  padding:9px 11px;margin-bottom:10px;
  background:rgba(255,255,255,.025);border:1px solid var(--b1);
  border-radius:var(--r8);font-size:12px;color:var(--t1);line-height:1.5;
  position:relative;
}
.dc-cond svg{width:12px;height:12px;flex-shrink:0;margin-top:2px;color:var(--t2)}

/* Row 3: action buttons */
.dc-acts{display:flex;gap:7px;position:relative;margin-bottom:10px}
.da{
  flex:1;padding:8px 10px;border-radius:var(--r8);
  font-size:12px;font-weight:600;letter-spacing:-.01em;
  border:none;transition:all .14s;
}
.da.release{background:var(--teal2);color:#06060f}
.da.release:hover{background:#34e4cc;box-shadow:0 0 14px var(--tealg)}
.da.receipt{background:var(--blues);color:var(--blue2);border:1px solid rgba(81,98,248,.16)!important}
.da.receipt:hover{background:rgba(81,98,248,.18)}
.da.ghost{background:rgba(255,255,255,.035);color:var(--t1);border:1px solid var(--b1)!important}
.da.ghost:hover{background:rgba(255,255,255,.06);color:var(--t0)}

/* Row 4: meta */
.dc-meta{display:flex;justify-content:space-between;align-items:center;position:relative}
.dc-tx{font-size:10px;font-family:var(--mono);color:var(--t3)}
.dc-dt{font-size:10px;color:var(--t3)}

/* Empty state */
.empty{
  padding:48px 20px;display:flex;flex-direction:column;
  align-items:center;text-align:center;gap:10px;
}
.empty-ic{
  width:56px;height:56px;border-radius:var(--r14);
  background:var(--s1);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;margin-bottom:4px;
}
.empty-ic svg{width:26px;height:26px;color:var(--t3)}
.empty-t{font-size:15px;font-weight:600;color:var(--t1)}
.empty-s{font-size:12px;color:var(--t3);max-width:220px;line-height:1.6;font-family:var(--mono)}

/* Thinking */
.think{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:11px;color:var(--t2);font-family:var(--mono);flex-shrink:0}
.td span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--blue2);margin:0 1.5px;animation:td .9s ease-in-out infinite}
.td span:nth-child(2){animation-delay:.15s}.td span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:scale(.45);opacity:.25}40%{transform:scale(1.1);opacity:1}}
.pbar{height:1px;background:linear-gradient(90deg,var(--blue),var(--blue2),var(--teal2));border-radius:99px;flex-shrink:0;margin:0 20px 10px;animation:pb 1.6s ease-in-out infinite}
@keyframes pb{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}

/* ═══════════════════════════════════════
   INPUT ZONE
═══════════════════════════════════════ */
.input-zone{
  flex-shrink:0;
  padding:12px 20px;
  background:rgba(6,6,15,.88);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--b1);
  padding-bottom:max(12px,env(safe-area-inset-bottom));
}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.chip{
  font-size:11px;font-family:var(--mono);color:var(--t2);
  background:rgba(255,255,255,.03);border:1px solid var(--b1);
  border-radius:100px;padding:4px 11px;cursor:pointer;transition:all .14s;white-space:nowrap;
}
.chip:hover{color:var(--t1);border-color:var(--b2);background:var(--s1)}
.irow{display:flex;gap:8px;align-items:flex-end}
.ifield{
  flex:1;position:relative;
  background:rgba(255,255,255,.04);border:1px solid var(--b2);
  border-radius:var(--r12);transition:all .2s;
}
.ifield:focus-within{border-color:rgba(81,98,248,.48);box-shadow:0 0 0 3px rgba(81,98,248,.07)}
.ifield textarea{
  width:100%;background:transparent;border:none;outline:none;
  padding:11px 14px;font-size:13px;color:var(--t0);
  resize:none;display:block;line-height:1.5;
}
.ifield textarea::placeholder{color:var(--t3)}
.ibeam{
  position:absolute;bottom:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--teal2),transparent);
  opacity:0;transition:opacity .22s;border-radius:99px;
}
.ifield:focus-within .ibeam{opacity:1}
.sbtn{
  width:44px;height:44px;flex-shrink:0;border-radius:var(--r12);border:none;
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px var(--blueg);transition:all .2s;
}
.sbtn:hover{background:var(--blue2);transform:scale(1.06);box-shadow:0 0 28px var(--blueg)}
.sbtn:disabled{background:rgba(255,255,255,.07);color:var(--t3);box-shadow:none;transform:none}
.sbtn svg{width:18px;height:18px}

/* ═══════════════════════════════════════
   DETAIL PANEL  — right rail, desktop
   Bottom sheet, mobile
═══════════════════════════════════════ */
.detail-panel{
  width:340px;flex-shrink:0;
  background:rgba(6,6,15,.8);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-left:1px solid var(--b1);
  display:flex;flex-direction:column;gap:12px;
  padding:18px 16px;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent;
  animation:dpIn .26s ease;
}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px}
@keyframes dpIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.dp-hdr{display:flex;align-items:center;justify-content:space-between}
.dp-ey{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.dp-x{background:none;border:none;color:var(--t2);padding:4px;border-radius:var(--r4);cursor:pointer;transition:color .14s;display:flex;align-items:center}
.dp-x:hover{color:var(--t0)}
.dp-x svg{width:15px;height:15px}
.dp-amt{font-family:var(--mono);font-size:40px;font-weight:300;letter-spacing:-.05em;line-height:1}
.dp-tok{font-size:17px;color:var(--t2)}
.dp-to{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:5px}
.iblk{background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:var(--r8);padding:10px 12px}
.iblk-lbl{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.iblk-val{font-size:12px;color:var(--t1);line-height:1.6}

/* Timeline */
.tl{display:flex;flex-direction:column}
.tl-row{display:flex;gap:10px}
.tl-track{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0;margin-top:4px}
.tl-dot.done{background:var(--teal2);box-shadow:0 0 7px var(--tealg)}
.tl-dot.active{background:var(--amber);box-shadow:0 0 7px var(--amberg);animation:blink 2s ease-in-out infinite}
.tl-line{width:1px;flex:1;background:var(--b1);min-height:20px}
.tl-body{padding-bottom:14px}
.tl-t{font-size:12px;font-weight:500}
.tl-s{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:2px}
.dp-btn{
  width:100%;padding:11px;border-radius:var(--r8);
  font-size:13px;font-weight:600;border:none;transition:all .14s;
}
.dp-btn.rel{background:var(--teal2);color:#06060f}
.dp-btn.rel:hover{background:#34e4cc;box-shadow:0 0 12px var(--tealg)}
.dp-btn.rc{background:var(--blue);color:#fff;box-shadow:0 0 12px var(--blueg)}
.dp-btn.rc:hover{background:var(--blue2)}

/* ═══════════════════════════════════════
   BOTTOM NAV  (mobile only)
═══════════════════════════════════════ */
.bottom-nav{
  display:none;flex-shrink:0;z-index:30;
  background:rgba(6,6,15,.94);
  backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
  border-top:1px solid var(--b1);
  padding-bottom:max(6px,env(safe-area-inset-bottom));
}
.bn{display:flex;justify-content:space-around;padding:6px 0}
.bn-i{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:var(--r10);
  font-size:10px;font-weight:500;color:var(--t2);
  border:none;background:none;cursor:pointer;transition:all .14s;
  position:relative;min-width:58px;
}
.bn-i.on{color:var(--blue2)}
.bn-i svg{width:20px;height:20px}
.bn-badge{
  position:absolute;top:4px;right:8px;
  width:14px;height:14px;border-radius:50%;
  background:var(--amber);color:#06060f;
  font-size:8px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--bg);
}

/* ═══════════════════════════════════════
   CONFIRM SHEET
═══════════════════════════════════════ */
.shbg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.68);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fi .2s ease;
}
.sh{
  width:100%;max-width:620px;
  background:rgba(7,7,20,.96);
  backdrop-filter:blur(44px) saturate(200%);-webkit-backdrop-filter:blur(44px) saturate(200%);
  border:1px solid var(--b3);border-bottom:none;
  border-radius:var(--r20) var(--r20) 0 0;
  padding:0 22px 24px;
  animation:sup .34s cubic-bezier(.16,.84,.44,1);
  padding-bottom:max(24px,env(safe-area-inset-bottom));
}
@keyframes sup{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh-grip{width:38px;height:3px;background:rgba(255,255,255,.14);border-radius:99px;margin:14px auto 20px}
.sh-title{font-size:19px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px}
.sh-sub{font-size:12px;color:var(--t2);margin-bottom:18px}
.ai-card{background:var(--blues);border:1px solid rgba(81,98,248,.2);border-radius:var(--r12);padding:12px 14px;margin-bottom:14px}
.ai-hdr{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--blue2);margin-bottom:5px}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.ai-q{font-size:13px;color:rgba(255,255,255,.73);line-height:1.62;font-style:italic}
.sh-fields{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
.shf{background:rgba(255,255,255,.025);border:1px solid var(--b1);border-radius:var(--r8);padding:10px 12px}
.shf-l{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.shf-v{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--t0);letter-spacing:-.02em}
.sh-acts{display:flex;gap:8px}
.sh-cancel{
  background:var(--s1);color:var(--t1);border:1px solid var(--b1);
  padding:12px 20px;border-radius:var(--r12);font-size:13px;transition:all .2s;
}
.sh-cancel:hover{background:var(--s2);color:var(--t0)}
.sh-confirm{
  flex:1;background:var(--blue);color:#fff;border:none;
  padding:12px;border-radius:var(--r12);font-size:14px;font-weight:600;letter-spacing:-.01em;
  box-shadow:0 0 22px var(--blueg);transition:all .2s;
}
.sh-confirm:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 0 36px var(--blueg)}
.sh-confirm:disabled{background:rgba(255,255,255,.07);color:var(--t3);box-shadow:none;transform:none}

/* ═══════════════════════════════════════
   RECEIPT MODAL
═══════════════════════════════════════ */
.rcbg{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:center;
  padding:18px;animation:fi .2s ease;
}
.rc{
  width:100%;max-width:460px;
  background:rgba(7,7,20,.97);
  border:1px solid rgba(81,98,248,.3);border-radius:20px;
  overflow:hidden;max-height:90vh;overflow-y:auto;
  box-shadow:0 0 80px rgba(81,98,248,.1),0 40px 80px rgba(0,0,0,.5);
  animation:pop .34s cubic-bezier(.16,.84,.44,1);
}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.rc-head{
  padding:28px 28px 22px;text-align:center;
  background:radial-gradient(ellipse 100% 55% at 50% 0%,rgba(81,98,248,.13),transparent);
  border-bottom:1px solid var(--b1);
}
.rc-ey{font-size:9px;font-weight:600;letter-spacing:.17em;text-transform:uppercase;color:var(--blue2);margin-bottom:18px}
.rc-amt{font-family:var(--mono);font-size:54px;font-weight:300;letter-spacing:-.05em;line-height:1}
.rc-tok{font-size:20px;color:var(--t2)}
.rc-sum{font-size:13px;color:var(--t2);margin-top:7px;line-height:1.5}
.rc-body{padding:20px 28px 24px}
.rc-rows{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.rc-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;gap:14px}
.rc-k{color:var(--t3);flex-shrink:0}
.rc-v{font-family:var(--mono);color:var(--t1);text-align:right;line-height:1.5}
.rc-hr{border:none;border-top:1px solid var(--b1);margin-bottom:16px}
.rc-stamp{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px;background:var(--teals);border:1px solid rgba(15,173,167,.2);
  border-radius:var(--r8);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--teal2);margin-bottom:16px;
}
.rc-stamp svg{width:13px;height:13px}
.rc-acts{display:flex;gap:8px}
.rc-close{
  flex:1;padding:11px;border-radius:var(--r8);
  background:var(--s1);color:var(--t1);border:1px solid var(--b1);font-size:13px;transition:all .2s;
}
.rc-close:hover{background:var(--s2);color:var(--t0)}
.rc-share{
  flex:1;padding:11px;border-radius:var(--r8);
  background:var(--blue);color:#fff;border:none;
  font-size:13px;font-weight:600;box-shadow:0 0 12px var(--blueg);transition:all .2s;
}
.rc-share:hover{background:var(--blue2)}

/* ═══════════════════════════════════════
   ACTIVITY + SETTINGS pages
═══════════════════════════════════════ */
.page-body{flex:1;overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.page-body::-webkit-scrollbar{width:3px}
.page-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px}

.act-item{
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;border-radius:var(--r12);margin-bottom:7px;
  background:var(--s1);border:1px solid var(--b1);transition:border-color .14s;
}
.act-item:hover{border-color:var(--b2)}
.act-ic{width:34px;height:34px;border-radius:var(--r8);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.act-ic svg{width:14px;height:14px}
.ai-rel{background:var(--teals);color:var(--teal2)}.ai-lock{background:var(--ambers);color:var(--amber2)}.ai-new{background:var(--blues);color:var(--blue2)}
.act-body{flex:1;min-width:0}
.act-t{font-size:13px;font-weight:500;color:var(--t0);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-s{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:2px}
.act-amt{font-size:13px;font-weight:600;font-family:var(--mono);flex-shrink:0}

.set-grp{margin-bottom:22px}
.set-grp-t{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r8);margin-bottom:5px;transition:border-color .14s;
}
.set-row:hover{border-color:var(--b2)}
.sr-t{font-size:13px;font-weight:500;color:var(--t0)}
.sr-s{font-size:11px;color:var(--t3);margin-top:2px}
.sr-v{font-size:11px;font-family:var(--mono);color:var(--blue2);white-space:nowrap;margin-left:12px}
.tog{
  width:36px;height:20px;border-radius:100px;background:rgba(255,255,255,.1);
  border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;margin-left:12px;
}
.tog.on{background:var(--blue)}
.tog::after{
  content:'';position:absolute;top:2.5px;left:2.5px;
  width:15px;height:15px;border-radius:50%;background:#fff;
  transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.tog.on::after{transform:translateX(16px)}

/* ═══════════════════════════════════════
   TOASTS
═══════════════════════════════════════ */
#toasts{
  position:fixed;bottom:18px;right:18px;z-index:500;
  display:flex;flex-direction:column;gap:7px;pointer-events:none;
}
.toast{
  background:rgba(7,7,20,.96);
  backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
  border:1px solid var(--b2);border-radius:var(--r14);
  padding:12px 16px;min-width:260px;max-width:300px;
  box-shadow:0 14px 40px rgba(0,0,0,.5);
  animation:tsi .26s cubic-bezier(.16,.84,.44,1);
  pointer-events:all;
}
@keyframes tsi{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.s{border-color:rgba(15,173,167,.38)}.toast.e{border-color:rgba(244,63,94,.38)}
.toast-t{font-size:13px;font-weight:600;color:var(--t0);margin-bottom:2px}
.toast-b{font-size:11px;font-family:var(--mono);color:var(--t1);line-height:1.5}

/* Confetti */
.cp{position:fixed;pointer-events:none;z-index:400;animation:cf 2.2s ease-in forwards}
@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(1260deg);opacity:0}}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(min-width:768px){
  .stats{grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
  .sc{
    height:78px;
    padding:10px 14px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .sc-lbl{margin-bottom:5px}
  .sc-val{font-size:23px}
  .sc-d{margin-top:3px}
  .tb-ham{display:none}
  .bottom-nav{display:none}
}

@media(max-width:767px){
  /* Sidebar becomes slide-over */
  .sidebar{
    position:fixed;top:var(--topbar-h);bottom:0;left:0;
    transform:translateX(-100%);z-index:26;
    box-shadow:4px 0 28px rgba(0,0,0,.4);
  }
  .sidebar.open{transform:translateX(0)}
  /* Show hamburger, hide wallet pill */
  .tb-ham{display:flex}
  .pill-wallet{display:none}
  /* Bottom nav */
  .bottom-nav{display:block}
  /* Let the page scroll as one unit on mobile so cards are not trapped below the fixed dashboard controls. */
  .dash{
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }
  .stats{gap:8px;margin-bottom:10px;grid-auto-rows:84px}
  .sc{
    height:84px;
    padding:10px 12px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .sc-lbl{font-size:9px;margin-bottom:5px}
  .sc-val{font-size:23px}
  .sc-d{margin-top:3px}
  .ins-bar{padding:6px 10px;margin-bottom:10px}
  .flow{padding:8px 10px;margin-bottom:10px}
  .fc{width:26px;height:26px}
  .fc svg{width:11px;height:11px}
  .fcon{margin-bottom:12px}
  .deals-content{
    display:block;
    flex:0 0 auto;
    overflow:visible;
    min-height:auto;
  }
  .deals-left{
    display:block;
    overflow:visible;
  }
  .deals-scroll{
    flex:0 0 auto;
    overflow:visible;
    padding:0 14px 116px;
  }
  .dc{padding:14px 16px}
  /* Detail panel → bottom sheet */
  .detail-panel{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    width:100%;max-height:72vh;
    border-left:none;border-top:1px solid var(--b2);
    border-radius:var(--r20) var(--r20) 0 0;
    padding-bottom:max(18px,env(safe-area-inset-bottom));
    animation:sup .28s cubic-bezier(.16,.84,.44,1);
  }
  /* Tighter spacing */
  .dash-hd   {padding:14px 14px 0}
  .input-zone{
    position:sticky;bottom:0;z-index:22;
    padding:10px 14px;
    padding-bottom:max(10px,env(safe-area-inset-bottom));
  }
  .chips{
    flex-wrap:nowrap;
    overflow-x:auto;
    overflow-y:hidden;
    margin-bottom:7px;
    padding-bottom:2px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto}
  .page-body {padding:0 14px 14px}
  /* Toasts full-width at bottom */
  #toasts{bottom:72px;right:10px;left:10px}
  .toast{min-width:unset;max-width:100%}
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="app"></div>
<div id="toasts"></div>

<script>
/* ─── Canvas background ─────────────────── */
(()=>{
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const O=[
    {rx:.12,ry:.14,r:500,ax:85,ay:95,fx:.00010,fy:.000082,ph:0,  rgb:[81,98,248]},
    {rx:.88,ry:.80,r:420,ax:-88,ay:-72,fx:.000082,fy:.00010,ph:2.2,rgb:[15,173,167]},
    {rx:.50,ry:.96,r:300,ax:60,ay:-50,fx:.000096,fy:.000088,ph:4.4,rgb:[245,158,11]},
    {rx:.86,ry:.07,r:240,ax:-52,ay:60,fx:.00012,fy:.000090,ph:1.1,rgb:[244,63,94]},
  ];
  function resize(){cv.width=innerWidth;cv.height=innerHeight}
  resize();addEventListener('resize',resize);
  let t=0;
  (function draw(){
    t++;ctx.clearRect(0,0,cv.width,cv.height);
    O.forEach(o=>{
      const x=o.rx*cv.width +Math.sin(t*o.fx+o.ph)*o.ax;
      const y=o.ry*cv.height+Math.cos(t*o.fy+o.ph)*o.ay;
      const g=ctx.createRadialGradient(x,y,0,x,y,o.r);
      const[r,gr,b]=o.rgb;
      g.addColorStop(0,`rgba(${r},${gr},${b},.085)`);
      g.addColorStop(.5,`rgba(${r},${gr},${b},.036)`);
      g.addColorStop(1,`rgba(${r},${gr},${b},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,o.r,0,Math.PI*2);ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

const SYS=`You are IntentPay's AI financial operator. Parse the user's deal description.
Return ONLY a JSON object — no markdown, no explanation.
Schema: {"recipient":"name","amount":"number string","token":"MNT or USDC or ETH","condition":"clear actionable condition","deadline":"X days","summary":"one sentence starting with I've"}
Defaults: token=MNT, deadline=14 days.`;

async function parseIntent(txt){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,system:SYS,messages:[{role:'user',content:txt}]})
  });
  const d=await r.json();
  const raw=d.content?.[0]?.text||'';
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('no json');
  return JSON.parse(m[0]);
}

    <div class="dp-to">→ ${esc(d.recipient)}</div>
  </div>
  ${d.status==='escrow'
    ?`<span class="sp esc" style="align-self:flex-start"><span class="sp-dot esc"></span>In Escrow</span>`
    :`<span class="sp rel" style="align-self:flex-start"><span class="sp-dot rel"></span>Released</span>`}
  <div class="iblk">
    <div class="iblk-lbl">Release condition</div>
    <div class="iblk-val">${esc(d.condition)}</div>
  </div>
  <div>
    <div class="iblk-lbl" style="font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:10px">Timeline</div>
    <div class="tl">
      ${steps.map((s,i)=>`
      <div class="tl-row">
        <div class="tl-track">
          <div class="tl-dot${s.done?' done':s.active?' active':''}"></div>
          ${i<steps.length-1?'<div class="tl-line"></div>':''}
        </div>
        <div class="tl-body">
          <div class="tl-t" style="color:${s.done?'var(--t0)':s.active?'var(--amber)':'var(--t3)'}">${esc(s.l)}</div>
          <div class="tl-s">${esc(s.s)}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>
  ${d.status==='escrow'  ?`<button class="dp-btn rel" data-release="${esc(d.id)}">Release funds</button>`:''}
  ${d.status==='released'?`<button class="dp-btn rc"  data-receipt="${esc(d.id)}">View receipt</button>`:''}
  <div class="iblk">
    <div class="iblk-lbl">On-chain info</div>
    <div class="iblk-val" style="font-family:var(--mono);font-size:11px;line-height:2;color:var(--t1)">
      Chain: Mantle Testnet (5001)<br>Contract: ${stx(d.tx)}<br>Standard: ERC-8004<br>Fallback: ${esc(d.deadline)}
    </div>
  </div>
</div>`;}

/* ── Confirm sheet ── */
function confirmSheet(){const p=S.pending;return`
<div class="shbg" id="shbg">
  <div class="sh">
    <div class="sh-grip"></div>
    <div class="sh-title">Confirm your deal</div>
    <div class="sh-sub">Review what I understood — then I'll lock the funds on Mantle.</div>
    <div class="ai-card">
      <div class="ai-hdr"><div class="ai-dot"></div>IntentPay AI</div>
      <div class="ai-q">"${esc(p.summary)}"</div>
    </div>
    <div class="sh-fields">
      ${[['Recipient',p.recipient],['Amount',p.amount+' '+p.token],['Condition',p.condition],['Auto-refund','After '+p.deadline]].map(([l,v])=>`
      <div class="shf"><div class="shf-l">${l}</div><div class="shf-v">${esc(v)}</div></div>`).join('')}
    </div>
    <div class="sh-acts">
      <button class="sh-cancel" id="sh-cancel">Cancel</button>
      <button class="sh-confirm" id="sh-confirm" ${S.confirming?'disabled':''}>
        ${S.confirming?`<span class="spin">↻</span> Securing on Mantle…`:'Lock funds on Mantle'}
      </button>
    </div>
  </div>
</div>`;}

/* ── Receipt modal ── */
function receiptModal(){
  const d=S.deals.find(x=>x.id===S.rcId);if(!d)return'';
  return`
<div class="rcbg" id="rcbg">
  <div class="rc">
    <div class="rc-head">
      <div class="rc-ey">IntentPay · Verified · Mantle Network</div>
      <div class="rc-amt">${esc(d.amount)}<span class="rc-tok"> ${esc(d.token)}</span></div>
      <div class="rc-sum">${esc(d.summary)}</div>
    </div>
    <div class="rc-body">
      <div class="rc-rows">
        ${[['Recipient',d.recipient],['Condition',d.condition],['Completed',d.createdAt],['TX Hash',stx(d.tx)],['Chain','Mantle Testnet · 5001'],['Standard','ERC-8004 Agent Identity']].map(([k,v])=>`
        <div class="rc-row"><span class="rc-k">${k}</span><span class="rc-v">${esc(v)}</span></div>`).join('')}
      </div>
      <hr class="rc-hr"/>
      <div class="rc-stamp">${IC.check} Verified on-chain · Condition met · AI-enforced</div>
      <div class="rc-acts">
        <button class="rc-close" id="rc-close">Close</button>
        <button class="rc-share" id="rc-share">Share on X</button>
      </div>
    </div>
  </div>
</div>`;}

/* ── Activity page ── */
function activityPage(){
  const im={rel:IC.check,lock:IC.lock,new:IC.chain};
  return`
<div class="dash">
  <div class="dash-hd"><div class="dash-title">Activity</div><div class="dash-sub">On-chain transaction history</div></div>
  <div class="page-body">
    ${S.activity.map(a=>`
    <div class="act-item">
      <div class="act-ic ai-${a.type}">${im[a.type]||IC.bolt}</div>
      <div class="act-body">
        <div class="act-t">${esc(a.title)}</div>
        <div class="act-s">${a.tx?'TX: '+stx(a.tx)+' · ':''}${esc(a.time)}</div>
      </div>
      ${a.amount?`<div class="act-amt" style="color:${a.type==='rel'?'var(--teal2)':'var(--amber2)'}">${esc(a.amount)}</div>`:''}
    </div>`).join('')}
  </div>
</div>`;}

/* ── Settings page ── */
function settingsPage(){return`
<div class="dash">
  <div class="dash-hd"><div class="dash-title">Settings</div><div class="dash-sub">Wallet preferences and deal defaults</div></div>
  <div class="page-body">
    <div class="set-grp">
      <div class="set-grp-t">Wallet</div>
      <div class="set-row"><div><div class="sr-t">Connected wallet</div><div class="sr-s">Mantle Testnet · EVM-compatible</div></div><div class="sr-v">0x4F2a…3B8c</div></div>
      <div class="set-row"><div><div class="sr-t">Network</div><div class="sr-s">Chain ID 5001</div></div><div class="sr-v" style="color:var(--teal2)">Connected</div></div>
    </div>
    <div class="set-grp">
      <div class="set-grp-t">Deal Defaults</div>
      ${[['autoRefund','Auto-refund on deadline','Return funds if condition not met'],
         ['aiConfirm','AI confirmation step','Review parsed deal before locking'],
         ['notifications','Delivery notifications','Alert when recipient uploads proof'],
         ['riskAlerts','Risk score alerts','Flag high-risk deals before locking']].map(([k,t,s])=>`
      <div class="set-row">
        <div><div class="sr-t">${t}</div><div class="sr-s">${s}</div></div>
        <button class="tog${S.settings[k]?' on':''}" data-tog="${k}"></button>
      </div>`).join('')}
    </div>
    <div class="set-grp">
      <div class="set-grp-t">About</div>
      <div class="set-row"><div><div class="sr-t">Version</div><div class="sr-s">Mantle Turing Test Hackathon 2026</div></div><div class="sr-v">v0.1.0</div></div>
      <div class="set-row"><div><div class="sr-t">Contract standard</div><div class="sr-s">Agent identity on Mantle</div></div><div class="sr-v">ERC-8004</div></div>
      <div class="set-row"><div><div class="sr-t">Factory contract</div><div class="sr-s">IntentPayFactory.sol</div></div><div class="sr-v">${stx(mkTx())}</div></div>
    </div>
  </div>
</div>`;}

/* ─── Bind events ───────────────────────── */
function bind(){
  /* Landing */
  document.getElementById('connect-btn')?.addEventListener('click',()=>{S.view='app';render()});
  document.getElementById('demo-btn')?.addEventListener('click',()=>{S.view='app';render()});
  document.getElementById('logo-btn')?.addEventListener('click',()=>{if(S.view==='app'){S.view='landing';render()}});

  /* Hamburger */
  document.getElementById('ham-btn')?.addEventListener('click',()=>{S.sbOpen=!S.sbOpen;render()});
  document.getElementById('sb-veil')?.addEventListener('click',()=>{S.sbOpen=false;render()});

  /* Nav */
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',e=>{
    S.nav=e.currentTarget.dataset.nav;S.selId=null;S.sbOpen=false;render();
  }));

  /* Chips */
  document.querySelectorAll('[data-chip]').forEach(el=>el.addEventListener('click',e=>{
    const i=document.getElementById('di');if(i){i.value=e.currentTarget.dataset.chip;i.focus()}
  }));

  /* Send */
  document.getElementById('sbtn')?.addEventListener('click',doSend);
  document.getElementById('di')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}});

  /* Cards */
  document.querySelectorAll('[data-card]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('[data-release],[data-receipt],[data-detail]'))return;
    const id=el.dataset.card;S.selId=S.selId===id?null:id;render();
  }));
  document.querySelectorAll('[data-release]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();doRelease(e.currentTarget.dataset.release)}));
  document.querySelectorAll('[data-receipt]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.rcId=e.currentTarget.dataset.receipt;render()}));
  document.querySelectorAll('[data-detail]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.selId=e.currentTarget.dataset.detail;render()}));

  /* Detail */
  document.getElementById('dp-x')?.addEventListener('click',()=>{S.selId=null;render()});

  /* Sheet */
  document.getElementById('shbg')?.addEventListener('click',e=>{if(e.target.id==='shbg'){S.pending=null;render()}});
  document.getElementById('sh-cancel')?.addEventListener('click',()=>{S.pending=null;render()});
  document.getElementById('sh-confirm')?.addEventListener('click',doConfirm);

  /* Receipt */
  document.getElementById('rcbg')?.addEventListener('click',e=>{if(e.target.id==='rcbg'){S.rcId=null;render()}});
  document.getElementById('rc-close')?.addEventListener('click',()=>{S.rcId=null;render()});
  document.getElementById('rc-share')?.addEventListener('click',()=>{
    const d=S.deals.find(x=>x.id===S.rcId);if(!d)return;
    const txt=`Just used @IntentPay on @Mantle_Network to pay ${d.recipient} ${d.amount} ${d.token}.\n\nFunds held by AI escrow, released when condition was met. No middlemen.\n\nTX: ${d.tx}`;
    navigator.clipboard?.writeText(txt).then(()=>toast('Copied to clipboard','Paste into X / Twitter'));
  });

  /* Toggles */
  document.querySelectorAll('[data-tog]').forEach(el=>el.addEventListener('click',e=>{
    const k=e.currentTarget.dataset.tog;S.settings[k]=!S.settings[k];render();
  }));
}

/* ─── Actions ───────────────────────────── */
async function doSend(){
  const inp=document.getElementById('di');
  if(!inp||!inp.value.trim()||S.thinking)return;
  const txt=inp.value.trim();inp.value='';
  S.thinking=true;render();
  try{const p=await parseIntent(txt);S.pending=p;}
  catch(e){toast('Could not parse deal','Try: "Pay [name] [amount] [token] once [condition]"','e')}
  S.thinking=false;render();
}

async function doConfirm(){
  if(!S.pending||S.confirming)return;
  S.confirming=true;render();
  await new Promise(r=>setTimeout(r,1800));
  const p=S.pending,tx=mkTx();
  const deal={id:uid(),recipient:p.recipient,amount:p.amount,token:p.token,
    condition:p.condition,deadline:p.deadline,summary:p.summary,
    status:'escrow',tx,createdAt:nowD()};
  S.deals.unshift(deal);
  S.activity.unshift({id:Date.now(),type:'lock',title:`Secured ${p.amount} ${p.token} for ${p.recipient}`,amount:`${p.amount} ${p.token}`,time:nowT(),tx});
  S.confirming=false;S.pending=null;render();
  toast('Funds secured on Mantle',`I've locked ${p.amount} ${p.token} · ${stx(tx)}`);
}

async function doRelease(id){
  const d=S.deals.find(x=>x.id===id);if(!d)return;
  await new Promise(r=>setTimeout(r,700));
  S.deals=S.deals.map(x=>x.id===id?{...x,status:'released'}:x);
  if(S.selId===id)S.selId=id;
  S.activity.unshift({id:Date.now(),type:'rel',title:`Released ${d.amount} ${d.token} to ${d.recipient}`,amount:`${d.amount} ${d.token}`,time:nowT(),tx:mkTx()});
  render();confetti();
  toast(`${d.amount} ${d.token} released to ${d.recipient}`,'Condition met · TX confirmed on Mantle');
}

render();
</script>

</html>
